version: "3.9"
services:
  hai-haaii:
    build: .
    container_name: hai-haaii
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - .env
    networks:
      - highfishNetwork
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8787/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  highfishNetwork:
    external: true
